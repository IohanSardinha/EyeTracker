<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vision Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14;
  --surface: #13161f;
  --surface2: #1c2030;
  --border: #252a3a;
  --accent: #7eb8f7;
  --accent2: #b5d4fa;
  --text: #d8dde8;
  --muted: #4a5168;
  --green: #52c97a;
  --red: #f06464;
  --amber: #f0b964;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 680px;
  margin-bottom: 28px;
}
.header h1 {
  font-family: 'DM Mono', monospace;
  font-size: 1rem;
  font-weight: 400;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
}
.header-actions {
  display: flex;
  gap: 8px;
}

/* ── NAV PILLS ── */
.nav {
  display: flex;
  gap: 6px;
  margin-bottom: 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 4px;
}
.nav button {
  padding: 7px 20px;
  border: none;
  background: transparent;
  color: var(--muted);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  letter-spacing: 0.04em;
  transition: all 0.2s;
}
.nav button.active {
  background: var(--accent);
  color: var(--bg);
}
.nav button:not(.active):hover { color: var(--text); }

/* ── ICON BUTTON ── */
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  transition: all 0.2s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── PANEL ── */
.panel { width: 100%; max-width: 680px; }

/* ── EYE SELECTOR ── */
.eye-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
  justify-content: center;
}
.eye-btn {
  padding: 8px 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.eye-btn.active-left  { background: #1a2a3a; border-color: var(--accent); color: var(--accent); }
.eye-btn.active-right { background: #1a2a3a; border-color: var(--accent); color: var(--accent); }
.eye-btn.active-both  { background: #1a2a3a; border-color: var(--accent); color: var(--accent); }
.eye-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

/* ── LEVEL INDICATOR ── */
.level-indicator {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* ── PROGRESS DOTS ── */
.progress-dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 22px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  transition: all 0.3s;
}
.dot.done { background: var(--accent); border-color: var(--accent); }
.dot.current { background: transparent; border-color: var(--accent); box-shadow: 0 0 8px var(--accent)88; }

/* ── LETTER DISPLAY ── */
.letter-display {
  text-align: center;
  background: #f5f5f0;
  border-radius: var(--radius);
  padding: 32px 20px;
  margin-bottom: 24px;
  min-height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0.25em;
  color: #111;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  user-select: none;
  transition: font-size 0.4s ease;
}

/* ── INPUT ROW ── */
.input-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 18px;
}
.letter-input {
  width: 52px; height: 52px;
  text-align: center;
  font-size: 1.4rem;
  font-weight: 500;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--accent);
  outline: none;
  font-family: 'DM Mono', monospace;
  cursor: default;
  caret-color: transparent;
  /* Prevent mobile keyboard */
  pointer-events: none;
}
.letter-input.active-slot {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent)22;
  pointer-events: none;
}
.letter-input.correct { border-color: var(--green); background: #0f2a1a; color: var(--green); }
.letter-input.wrong   { border-color: var(--red);   background: #2a0f0f; color: var(--red);   }

/* ── KEYBOARD ── */
.keyboard {
  display: flex;
  flex-direction: column;
  gap: 7px;
  align-items: center;
  margin-bottom: 22px;
}
.kb-row { display: flex; gap: 5px; justify-content: center; }
.kb-key {
  width: 44px; height: 44px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 0.92rem;
  font-weight: 500;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: all 0.12s;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
}
.kb-key:hover  { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.kb-key:active { transform: scale(0.92); }
.kb-special {
  background: #1f1a2a;
  border-color: #3a3050;
  font-size: 0.68rem;
  min-width: 58px;
  width: auto;
  padding: 0 10px;
  font-family: 'DM Sans', sans-serif;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.kb-special:hover { background: #3a3050; color: var(--text); border-color: #5a4a80; }

/* ── SUBMIT ── */
.btn-primary {
  display: block;
  margin: 0 auto;
  padding: 13px 48px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-size: 0.92rem;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

/* ── RESULT BANNER ── */
.result-banner {
  text-align: center;
  padding: 14px 18px;
  border-radius: var(--radius);
  margin-bottom: 18px;
  font-size: 0.9rem;
  line-height: 1.5;
}
.result-banner small { display: block; margin-top: 4px; font-size: 0.78rem; opacity: 0.7; font-family: 'DM Mono', monospace; }
.banner-good  { background: #0d2218; border: 1px solid var(--green)66; color: var(--green); }
.banner-mid   { background: #22180a; border: 1px solid var(--amber)66; color: var(--amber); }
.banner-bad   { background: #220d0d; border: 1px solid var(--red)66;   color: var(--red);   }

/* ── COMPLETED ── */
.completed-msg { text-align: center; padding: 28px 16px; }
.completed-msg .label { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px; }
.completed-msg .big-score { font-family: 'DM Mono', monospace; font-size: 3.2rem; font-weight: 300; color: var(--accent); line-height: 1; margin-bottom: 10px; }
.completed-msg .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
.completed-msg .bd  { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: #333a4f; margin-bottom: 28px; line-height: 1.8; }
.btn-ghost {
  padding: 11px 30px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.84rem;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  margin: 4px;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost.accent { border-color: var(--accent); color: var(--accent); }
.btn-ghost.accent:hover { background: var(--accent); color: var(--bg); }

/* ── HISTORY ── */
.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}
.section-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.no-data { color: var(--muted); font-size: 0.88rem; text-align: center; padding: 48px 0; font-style: italic; }
table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
th {
  text-align: left;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
td { padding: 11px 12px; border-bottom: 1px solid var(--surface2); vertical-align: top; }
tr:hover td { background: var(--surface); }
.score-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-family: 'DM Mono', monospace; font-weight: 500; font-size: 0.88rem; }
.pill-green { background: #0d2218; color: var(--green); }
.pill-amber { background: #22180a; color: var(--amber); }
.pill-red   { background: #220d0d; color: var(--red); }
.eye-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.72rem; font-family: 'DM Mono', monospace;
  color: var(--muted); margin-top: 5px;
}
.tbl-detail { font-size: 0.68rem; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 5px; line-height: 1.7; }
.tbl-date { font-size: 0.9rem; color: var(--text); }
.tbl-time { font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 2px; }

/* ── CONFIG MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(12,14,20,0.88);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  width: calc(100% - 32px);
  max-width: 400px;
  transform: translateY(10px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  color: var(--accent);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.cfg-group { margin-bottom: 22px; }
.cfg-label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 0.82rem; color: var(--text); margin-bottom: 10px;
}
.cfg-label span {
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  color: var(--accent);
}
.cfg-slider {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  border-radius: 2px;
  background: var(--surface2);
  outline: none;
  cursor: pointer;
}
.cfg-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
  box-shadow: 0 0 0 4px var(--accent)33;
}
.cfg-slider::-moz-range-thumb {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
}
.size-preview {
  background: #f5f5f0;
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  color: #111;
  margin-top: 10px;
  letter-spacing: 0.2em;
  transition: font-size 0.2s;
}
.size-ladder {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-top: 14px;
}
.size-rung {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.7rem; font-family: 'DM Mono', monospace; color: var(--muted);
}
.rung-bar {
  flex: 1; height: 3px; border-radius: 2px;
  background: linear-gradient(to right, var(--accent), transparent);
  opacity: 0.4;
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
.btn-cfg {
  padding: 9px 22px;
  border-radius: 7px;
  font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.btn-cfg-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-cfg-cancel:hover { border-color: var(--text); color: var(--text); }
.btn-cfg-save { background: var(--accent); border: none; color: var(--bg); }
.btn-cfg-save:hover { background: var(--accent2); }

/* ── RESPONSIVE TWEAKS ── */
@media (max-width: 480px) {
  .kb-key { width: 36px; height: 40px; font-size: 0.82rem; }
  .kb-special { min-width: 48px; font-size: 0.62rem; }
  .letter-input { width: 46px; height: 48px; font-size: 1.2rem; }
  .eye-btn { padding: 7px 14px; font-size: 0.78rem; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>👁 Vision Tracker</h1>
  <div class="header-actions">
    <button class="icon-btn" onclick="openConfig()" title="Settings">⚙</button>
  </div>
</div>

<!-- MAIN NAV -->
<div class="nav">
  <button class="active" onclick="showPanel('test')">Test</button>
  <button onclick="showPanel('history')">History</button>
</div>

<!-- TEST PANEL -->
<div id="test-panel" class="panel">

  <!-- EYE SELECTOR -->
  <div class="eye-selector">
    <button class="eye-btn active-left" id="eye-left"  onclick="selectEye('left')" >👁 Left Eye</button>
    <button class="eye-btn"             id="eye-both"  onclick="selectEye('both')" >👀 Both</button>
    <button class="eye-btn"             id="eye-right" onclick="selectEye('right')">Right Eye 👁</button>
  </div>

  <div class="level-indicator" id="level-label">Level 1 of 5</div>
  <div class="progress-dots"  id="progress-dots"></div>
  <div class="letter-display"  id="letter-display">—</div>
  <div class="input-row"       id="input-row"></div>
  <div class="keyboard"        id="keyboard"></div>
  <div id="result-area"></div>
  <button class="btn-primary"  id="submit-btn" onclick="submitAnswer()">Check</button>
</div>

<!-- HISTORY PANEL -->
<div id="history-panel" class="panel" style="display:none">
  <div class="history-header">
    <div class="section-title">Test History</div>
    <button class="btn-ghost" style="padding:6px 14px;font-size:0.78rem" onclick="clearHistory()">Clear</button>
  </div>
  <div id="history-content"></div>
</div>

<!-- CONFIG MODAL -->
<div class="modal-overlay" id="config-modal" onclick="closeConfigOutside(event)">
  <div class="modal">
    <div class="modal-title">⚙ Configuration</div>

    <div class="cfg-group">
      <div class="cfg-label">
        Largest letter size
        <span id="size-val">5.0 rem</span>
      </div>
      <input type="range" class="cfg-slider" id="size-slider"
             min="2" max="10" step="0.5" value="5"
             oninput="onSizeSlider(this.value)">
      <div class="size-preview" id="size-preview">A B C D E</div>
    </div>

    <div class="cfg-group">
      <div class="cfg-label" style="margin-bottom:8px">Level size proportions</div>
      <div class="size-ladder" id="size-ladder"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cfg btn-cfg-cancel" onclick="closeConfig()">Cancel</button>
      <button class="btn-cfg btn-cfg-save"   onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────
// Proportions of each level relative to the max (level 1)
const PROPORTIONS = [1.0, 0.70, 0.44, 0.28, 0.18];
const LEVEL_LABELS = ['Very Large','Large','Medium','Small','Very Small'];
const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const KB_ROWS = ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];

let cfg = { maxRem: 5 };
let tempMaxRem = 5;

function loadCfg() {
  const s = localStorage.getItem('visionCfg');
  if (s) try { cfg = {...cfg, ...JSON.parse(s)}; } catch(e){}
}
function saveCfgStore() { localStorage.setItem('visionCfg', JSON.stringify(cfg)); }

function getLevelSizes() {
  return PROPORTIONS.map(p => +(cfg.maxRem * p).toFixed(2));
}

// ─── STATE ─────────────────────────────────────────────────
let lvl = 0, curLetters = [], activeInp = 0, sessAnswers = [];
let selectedEye = 'left'; // 'left' | 'right' | 'both'

// ─── INIT ──────────────────────────────────────────────────
loadCfg();
initTest();

function rand5() { return Array.from({length:5}, () => ALPHA[Math.floor(Math.random()*26)]); }

function initTest() {
  lvl = 0; sessAnswers = [];
  loadLevel();
}

function loadLevel() {
  curLetters = rand5(); activeInp = 0;
  const sizes = getLevelSizes();
  document.getElementById('level-label').textContent =
    'Level '+(lvl+1)+' of '+PROPORTIONS.length+' — '+LEVEL_LABELS[lvl];
  renderDots();
  renderDisplay(sizes[lvl]);
  renderInputs();
  renderKeyboard();
  document.getElementById('result-area').innerHTML = '';
  const sb = document.getElementById('submit-btn');
  if (sb) { sb.style.display = 'block'; sb.disabled = false; }
}

// ─── EYE SELECTOR ─────────────────────────────────────────
function selectEye(eye) {
  selectedEye = eye;
  ['left','both','right'].forEach(e => {
    const btn = document.getElementById('eye-'+e);
    btn.className = 'eye-btn' + (e === eye ? ' active-'+e : '');
  });
}

// ─── RENDER ────────────────────────────────────────────────
function renderDots() {
  const c = document.getElementById('progress-dots'); c.innerHTML = '';
  PROPORTIONS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < lvl ? ' done' : i === lvl ? ' current' : '');
    c.appendChild(d);
  });
}

function renderDisplay(sizeRem) {
  const d = document.getElementById('letter-display');
  d.style.fontSize = sizeRem + 'rem';
  d.textContent = curLetters.join('  ');
}

function renderInputs() {
  const row = document.getElementById('input-row'); row.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.readOnly = true;
    inp.setAttribute('inputmode', 'none');    // suppress mobile keyboard
    inp.setAttribute('autocomplete', 'off');
    inp.className = 'letter-input' + (i === 0 ? ' active-slot' : '');
    inp.id = 'inp-'+i;
    inp.value = '';
    // Allow clicking to move active slot (no keyboard)
    inp.addEventListener('mousedown', e => { e.preventDefault(); setActiveSlot(i); });
    inp.addEventListener('touchstart', e => { e.preventDefault(); setActiveSlot(i); }, {passive:false});
    row.appendChild(inp);
  }
}

function setActiveSlot(i) {
  if (i < 0 || i > 4) return;
  activeInp = i;
  for (let j = 0; j < 5; j++) {
    const inp = document.getElementById('inp-'+j);
    if (!inp || inp.classList.contains('correct') || inp.classList.contains('wrong')) continue;
    inp.className = 'letter-input' + (j === i ? ' active-slot' : '');
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard'); kb.innerHTML = '';
  KB_ROWS.forEach(row => {
    const div = document.createElement('div'); div.className = 'kb-row';
    row.split('').forEach(l => {
      const b = document.createElement('button');
      b.className = 'kb-key'; b.textContent = l;
      b.addEventListener('mousedown', e => { e.preventDefault(); typeKey(l); });
      b.addEventListener('touchstart', e => { e.preventDefault(); typeKey(l); }, {passive:false});
      div.appendChild(b);
    });
    if (row === 'ZXCVBNM') {
      const bk = document.createElement('button');
      bk.className = 'kb-key kb-special'; bk.textContent = '⌫ Delete';
      bk.addEventListener('mousedown', e => { e.preventDefault(); bksp(); });
      bk.addEventListener('touchstart', e => { e.preventDefault(); bksp(); }, {passive:false});
      div.appendChild(bk);
    }
    kb.appendChild(div);
  });
}

// ─── INPUT LOGIC ───────────────────────────────────────────
function typeKey(l) {
  const inp = document.getElementById('inp-'+activeInp);
  if (!inp || inp.classList.contains('correct') || inp.classList.contains('wrong')) return;
  inp.value = l;
  advanceSlot();
}

function advanceSlot() {
  // Move to next empty slot, or stay at last
  for (let i = activeInp + 1; i < 5; i++) {
    const inp = document.getElementById('inp-'+i);
    if (inp && !inp.classList.contains('correct') && !inp.classList.contains('wrong')) {
      setActiveSlot(i); return;
    }
  }
  // All filled — stay
  setActiveSlot(activeInp);
}

function bksp() {
  const inp = document.getElementById('inp-'+activeInp);
  if (inp && inp.value && !inp.classList.contains('correct') && !inp.classList.contains('wrong')) {
    inp.value = '';
  } else {
    // Move back
    for (let i = activeInp - 1; i >= 0; i--) {
      const p = document.getElementById('inp-'+i);
      if (p && !p.classList.contains('correct') && !p.classList.contains('wrong')) {
        setActiveSlot(i);
        p.value = '';
        return;
      }
    }
  }
}

// Physical keyboard support (desktop)
document.addEventListener('keydown', e => {
  if (document.getElementById('test-panel').style.display === 'none') return;
  if (/^[a-zA-Z]$/.test(e.key)) { typeKey(e.key.toUpperCase()); return; }
  if (e.key === 'Backspace') { e.preventDefault(); bksp(); return; }
  if (e.key === 'Enter') {
    const sb = document.getElementById('submit-btn');
    if (sb && sb.style.display !== 'none') submitAnswer();
  }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); setActiveSlot(activeInp - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); setActiveSlot(activeInp + 1); }
});

// ─── SUBMIT ────────────────────────────────────────────────
function getAnswers() {
  return Array.from({length:5}, (_, i) => (document.getElementById('inp-'+i)?.value||'').toUpperCase());
}

function submitAnswer() {
  const ans = getAnswers();
  let miss = false;
  ans.forEach((a, i) => {
    if (!a) { document.getElementById('inp-'+i).style.borderColor = 'var(--amber)'; miss = true; }
  });
  if (miss) return;

  const correct = ans.map((a, i) => a === curLetters[i]);
  const num = correct.filter(Boolean).length;

  for (let i = 0; i < 5; i++) {
    const inp = document.getElementById('inp-'+i);
    inp.className = 'letter-input ' + (correct[i] ? 'correct' : 'wrong');
  }

  const sizes = getLevelSizes();
  sessAnswers.push({
    letters: [...curLetters], answers: [...ans], correct: [...correct],
    level: lvl, sizeRem: sizes[lvl]
  });

  const ra = document.getElementById('result-area');
  const cls = num >= 4 ? 'banner-good' : num >= 2 ? 'banner-mid' : 'banner-bad';
  ra.innerHTML = `<div class="result-banner ${cls}">
    ${num}/5 correct &nbsp;·&nbsp; ${LEVEL_LABELS[lvl]}
    <small>Expected: ${curLetters.join(' ')} &nbsp;|&nbsp; You wrote: ${ans.join(' ')}</small>
  </div>`;

  document.getElementById('submit-btn').style.display = 'none';

  if (lvl < PROPORTIONS.length - 1) {
    const next = document.createElement('button');
    next.className = 'btn-primary'; next.style.marginTop = '12px';
    next.textContent = 'Next Level →';
    next.addEventListener('mousedown', e => { e.preventDefault(); lvl++; loadLevel(); });
    next.addEventListener('touchstart', e => { e.preventDefault(); lvl++; loadLevel(); }, {passive:false});
    ra.appendChild(next);
  } else {
    finishTest();
  }
}

// ─── FINISH ────────────────────────────────────────────────
function finishTest() {
  const total = sessAnswers.reduce((s, l) => s + l.correct.filter(Boolean).length, 0);
  const ttl = sessAnswers.length * 5;
  const pct = Math.round(total / ttl * 100);
  const bd = sessAnswers.map((l, i) => `${LEVEL_LABELS[i]}: ${l.correct.filter(Boolean).length}/5`).join('\n');

  const eyeLabel = selectedEye === 'left' ? '👁 Left Eye' : selectedEye === 'right' ? '👁 Right Eye' : '👀 Both Eyes';

  const record = {
    date: new Date().toISOString(),
    eye: selectedEye,
    totalCorrect: total, totalLetters: ttl, pct,
    maxRem: cfg.maxRem,
    levels: sessAnswers.map(l => ({
      level: l.level, letters: l.letters,
      answers: l.answers, correct: l.correct, sizeRem: l.sizeRem
    }))
  };
  const h = JSON.parse(localStorage.getItem('visionHistory')||'[]');
  h.unshift(record);
  localStorage.setItem('visionHistory', JSON.stringify(h));

  document.getElementById('test-panel').innerHTML = `
    <div class="completed-msg">
      <div class="label">${eyeLabel} · Test Complete</div>
      <div class="big-score">${pct}%</div>
      <div class="sub">${total}/${ttl} letters correct</div>
      <div class="bd">${bd.split('\n').join(' · ')}</div>
      <button class="btn-ghost accent" onclick="restartTest()">Take Test Again</button>
      <button class="btn-ghost" onclick="showPanel('history')">View History</button>
    </div>`;
}

function restartTest() {
  document.getElementById('test-panel').innerHTML = `
    <div class="eye-selector">
      <button class="eye-btn" id="eye-left"  onclick="selectEye('left')">👁 Left Eye</button>
      <button class="eye-btn" id="eye-both"  onclick="selectEye('both')">👀 Both</button>
      <button class="eye-btn" id="eye-right" onclick="selectEye('right')">Right Eye 👁</button>
    </div>
    <div class="level-indicator" id="level-label"></div>
    <div class="progress-dots"   id="progress-dots"></div>
    <div class="letter-display"  id="letter-display">—</div>
    <div class="input-row"       id="input-row"></div>
    <div class="keyboard"        id="keyboard"></div>
    <div id="result-area"></div>
    <button class="btn-primary"  id="submit-btn" onclick="submitAnswer()">Check</button>`;
  selectEye(selectedEye);
  initTest();
}

// ─── HISTORY ───────────────────────────────────────────────
const EYE_ICONS = { left: '👁L', right: '👁R', both: '👀' };

function renderHistory() {
  const h = JSON.parse(localStorage.getItem('visionHistory')||'[]');
  const c = document.getElementById('history-content');
  if (!h.length) { c.innerHTML = '<div class="no-data">No tests recorded yet.</div>'; return; }

  let html = `<table>
    <thead><tr>
      <th>Date</th><th>Eye</th><th>Score</th><th>Breakdown</th>
    </tr></thead><tbody>`;

  h.forEach(r => {
    const d = new Date(r.date);
    const ds = d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
    const ts = d.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
    const pill = r.pct >= 80 ? 'pill-green' : r.pct >= 50 ? 'pill-amber' : 'pill-red';
    const eyeIcon = EYE_ICONS[r.eye] || '?';
    const maxLabel = r.maxRem ? r.maxRem+'rem max' : '';
    const bd = (r.levels||[]).map((l, i) => LEVEL_LABELS[i]+': '+l.correct.filter(Boolean).length+'/5').join(' · ');
    html += `<tr>
      <td><div class="tbl-date">${ds}</div><div class="tbl-time">${ts}</div></td>
      <td><div style="font-family:'DM Mono',monospace;font-size:1rem">${eyeIcon}</div>
          <div class="tbl-time">${r.eye||''}</div></td>
      <td><span class="score-pill ${pill}">${r.pct}%</span>
          <div class="tbl-time">${r.totalCorrect}/${r.totalLetters}</div>
          ${maxLabel ? '<div class="tbl-time">'+maxLabel+'</div>' : ''}</td>
      <td><div class="tbl-detail">${bd||'—'}</div></td>
    </tr>`;
  });

  html += '</tbody></table>';
  c.innerHTML = html;
}

function clearHistory() {
  if (confirm('Clear all test history?')) {
    localStorage.removeItem('visionHistory');
    renderHistory();
  }
}

// ─── CONFIG MODAL ──────────────────────────────────────────
function openConfig() {
  tempMaxRem = cfg.maxRem;
  const slider = document.getElementById('size-slider');
  slider.value = tempMaxRem;
  updateConfigUI(tempMaxRem);
  document.getElementById('config-modal').classList.add('open');
}

function closeConfig() {
  document.getElementById('config-modal').classList.remove('open');
}

function closeConfigOutside(e) {
  if (e.target === document.getElementById('config-modal')) closeConfig();
}

function onSizeSlider(val) {
  tempMaxRem = parseFloat(val);
  updateConfigUI(tempMaxRem);
}

function updateConfigUI(maxRem) {
  document.getElementById('size-val').textContent = maxRem.toFixed(1) + ' rem';
  document.getElementById('size-preview').style.fontSize = maxRem + 'rem';

  // Update ladder
  const ladder = document.getElementById('size-ladder');
  ladder.innerHTML = '';
  PROPORTIONS.forEach((p, i) => {
    const sz = (maxRem * p).toFixed(1);
    const div = document.createElement('div');
    div.className = 'size-rung';
    div.innerHTML = `<span style="width:72px">${LEVEL_LABELS[i]}</span>
      <div class="rung-bar" style="opacity:${0.15 + p*0.85}"></div>
      <span style="width:48px;text-align:right">${sz} rem</span>`;
    ladder.appendChild(div);
  });
}

function saveConfig() {
  cfg.maxRem = tempMaxRem;
  saveCfgStore();
  closeConfig();
  // Refresh current level display if mid-test
  const sizes = getLevelSizes();
  const ld = document.getElementById('letter-display');
  if (ld) ld.style.fontSize = sizes[lvl] + 'rem';
}

// ─── PANEL SWITCH ──────────────────────────────────────────
function showPanel(p) {
  document.querySelectorAll('.nav button').forEach((b, i) =>
    b.classList.toggle('active', (p==='test'&&i===0)||(p==='history'&&i===1)));
  document.getElementById('test-panel').style.display  = p==='test'     ? 'block' : 'none';
  document.getElementById('history-panel').style.display = p==='history' ? 'block' : 'none';
  if (p === 'history') renderHistory();
}

// Init config UI
updateConfigUI(cfg.maxRem);
</script>
